# /etc/freeradius/3.0/mods-available/eap
# Inside the eap { ... } block, under the peap { ... } sub-section.
#
# CRITICAL: without this, PEAP does not forward the inner-tunnel reply
# attributes (the Tunnel-* VLAN trio) to the outer Access-Accept, so the
# NAS never sees the VLAN. See docs/troubleshooting.md #3.

        peap {
                default_eap_type = mschapv2
                use_tunneled_reply = yes
        }
