# /etc/hostapd/hostapd-wired.conf
# Wired 802.1X authenticator on the access port.

interface=ens38
driver=wired
ieee8021x=1
eap_reauth_period=3600

# Windows sends EAPOL v1 — must match, or frames are ignored.
# See docs/troubleshooting.md #2.
eapol_version=1

auth_server_addr=192.168.200.129
auth_server_port=1812
auth_server_shared_secret=testing123
use_pae_group_addr=1

dynamic_vlan=1
vlan_file=/etc/hostapd/hostapd.vlan
vlan_tagged_interface=ens38
vlan_bridge=brvlan

# --- RADIUS Dynamic Authorization (RFC 5176) ---
# Required for enforcement/coa-quarantine.sh to act on live sessions.
# Authorizes the FreeRADIUS host to send Disconnect/CoA messages.
radius_das_port=3799
radius_das_client=192.168.200.129 testing123
