# /etc/dnsmasq.conf (or /etc/dnsmasq.d/nac.conf)
# DHCP-only configuration for the NAC lab.

# Disable the DNS listener entirely to avoid the port 53 clash with
# systemd-resolved. DHCP still works. See docs/troubleshooting.md #4.
port=0

# Listen on the parent access interface, where the client's UNTAGGED
# DHCP frames actually arrive — NOT the tagged brvlanXX bridges.
# See docs/troubleshooting.md #5.
interface=ens38
bind-interfaces

# Production VLAN scope (example)
dhcp-range=192.168.10.50,192.168.10.150,255.255.255.0,12h
# Quarantine VLAN scope (example)
dhcp-range=192.168.99.50,192.168.99.150,255.255.255.0,12h
